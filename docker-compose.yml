version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: etnof_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-etnof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etnof_secret}
      POSTGRES_DB: ${POSTGRES_DB:-etnof_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etnof}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: etnof_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
